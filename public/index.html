<!DOCTYPE html>
<html>
<head>
<title>Temporary Chat</title>

<style>

body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat-container{
  width:420px;
  height:600px;
  background:white;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
}

.header{
  background:#4CAF50;
  color:white;
  padding:15px;
  border-radius:12px 12px 0 0;
  font-size:18px;
  font-weight:bold;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  background:#f7f7f7;
}

.message{
  max-width:70%;
  padding:10px 14px;
  margin:8px 0;
  border-radius:12px;
  font-size:14px;
  word-wrap:break-word;
}

.myMessage{
  background:#4CAF50;
  color:white;
  margin-left:auto;
  border-bottom-right-radius:3px;
}

.otherMessage{
  background:#e4e6eb;
  border-bottom-left-radius:3px;
}

.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #eee;
}

#msg{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  outline:none;
}

#msg:focus{
  border-color:#4CAF50;
}

.send-btn{
  margin-left:10px;
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

.send-btn:hover{
  background:#45a049;
}
#emoji-btn{
  font-size:20px;
  border:none;
  background:white;
  cursor:pointer;
  margin-right:8px;
}


</style>

</head>

<body>

<div class="chat-container">

<div class="header">
Temporary Chat
</div>

<div id="chat"></div>

<div class="input-area">
<button id="emoji-btn">😊</button>
<input id="msg" placeholder="Type message..." />
<button class="send-btn" onclick="send()">Send</button>
</div>


</div>

<script src="/socket.io/socket.io.js"></script>

<!-- Emoji library -->
<script src="https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.2/dist/emoji-button.min.js"></script>

<script>
const socket = io();

const roomId = new URLSearchParams(window.location.search).get("room") || "demo";
socket.emit("join-room", roomId);

socket.on("receive-message", msg => {

  const chat = document.getElementById("chat");
  const messageDiv = document.createElement("div");

  messageDiv.classList.add("message");

  if(msg.sender === socket.id){
    messageDiv.classList.add("myMessage");
  }else{
    messageDiv.classList.add("otherMessage");
  }

  messageDiv.innerText = msg.text;

  chat.appendChild(messageDiv);
  chat.scrollTop = chat.scrollHeight;
});

function send(){
  const input = document.getElementById("msg");

  if(!input.value.trim()) return;

  socket.emit("send-message", {
    roomId,
    message: input.value
  });

  input.value = "";
}
</script>

<script type="module">
import { EmojiButton } from "https://cdn.jsdelivr.net/npm/@joeattardi/emoji-button@4.6.4/+esm";

document.addEventListener("DOMContentLoaded", () => {

  const button = document.querySelector('#emoji-btn');
  const input = document.querySelector('#msg');

  const picker = new EmojiButton();

  picker.on('emoji', emoji => {
  input.value += emoji.emoji;
});


  button.addEventListener('click', () => {
    picker.togglePicker(button);
  });

});
</script>






</body>
</html>
